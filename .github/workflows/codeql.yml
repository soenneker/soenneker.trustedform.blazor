name: codeql

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'test/**'
  workflow_dispatch:

env:
  NUGET_XMLDOC_MODE: skip

permissions:
  actions: read
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    name: CodeQL Analysis

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: Setup CodeQL CLI
        run: |
          curl -L https://github.com/github/codeql-action/releases/latest/download/codeql-bundle-linux64.tar.gz -o codeql.tar.gz
          tar -xzf codeql.tar.gz
          echo "$PWD/codeql" >> $GITHUB_PATH

      - name: Create CodeQL database
        run: |
          codeql database create codeql-db \
            --language=csharp \
            --command="dotnet build ./src/Soenneker.TrustedForm.Blazor/Soenneker.TrustedForm.Blazor.csproj --configuration Release"

      - name: Run CodeQL analysis
        run: |
          codeql database analyze codeql-db \
            codeql/csharp-queries \
            --format=sarifv2.1.0 \
            --output=results.sarif

      - name: Upload SARIF with PAT
        env:
          CODEQL_PAT: ${{ secrets.CODEQL_PAT }}
        run: |
          echo "$CODEQL_PAT" | codeql github upload-results \
            --repository ${{ github.repository }} \
            --ref ${{ github.ref }} \
            --commit ${{ github.sha }} \
            --sarif results.sarif \
            --github-auth-stdin